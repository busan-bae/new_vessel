{% extends "base.html" %}

{% block title %}500 - 서버 오류{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/404_500.css') }}" />
{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">500</div>
  <h1 class="error-title">서버 오류가 발생했습니다.</h1>
  <p class="error-desc">일시적인 문제가 발생했습니다. 잠시 후 다시 시도해주세요.</p>
  <a href="{{ url_for('main.home') }}" class="btn btn-primary btn-lg">홈으로 돌아가기</a>
</div>
{% endblock %}
