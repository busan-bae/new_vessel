{% extends "base.html" %}

{% block title %}404 - 페이지를 찾을 수 없습니다{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/404_500.css') }}" />
{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">404</div>
  <h1 class="error-title">페이지를 찾을 수 없습니다.</h1>
  <p class="error-desc">요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
  <a href="{{ url_for('main.home') }}" class="btn btn-primary btn-lg">홈으로 돌아가기</a>
</div>
{% endblock %}
