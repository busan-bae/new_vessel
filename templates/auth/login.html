{% extends "base.html" %}

{% block title %}로그인 - HOS 선박관리{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
{% endblock %}

{% block content %}
<div class="container-sm auth-page">

  <!-- 상단 헤더 (아이콘 + 제목) -->
  <div class="auth-header">
    <span class="auth-icon">⚓</span>
    <h1 class="auth-title">로그인</h1>
    <p class="auth-subtitle">HOS 선박관리 시스템에 오신 것을 환영합니다.</p>
  </div>

  <div class="card">
    <!-- 오류 메시지 -->
    {% if error %}
      <div class="form-error">{{ error }}</div>
    {% endif %}

    <!-- 로그인 폼 -->
    <form method="POST" action="{{ url_for('auth.login') }}">
      <!-- CSRF 토큰: Flask-SeaSurf가 폼 위조 방지를 위해 검증 -->
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label class="form-label" for="username">아이디</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          placeholder="아이디를 입력하세요"
          required
          autofocus
        />
      </div>

      <div class="form-group" style="margin-bottom:1.5rem;">
        <label class="form-label" for="password">비밀번호</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="비밀번호를 입력하세요"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg">로그인</button>
    </form>

    <p class="auth-footer">
      계정이 없으신가요?
      <a href="{{ url_for('auth.signup') }}">회원가입</a>
    </p>
  </div>

</div>
{% endblock %}
