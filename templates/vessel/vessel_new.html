{% extends "base.html" %}

{% block title %}선박 등록 - HOS 선박관리{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/vessel_new.css') }}" />
{% endblock %}

{% block content %}
<div class="container form-page">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">선박 등록</h1>
      <p class="page-subtitle">새 선박 정보를 입력하세요.</p>
    </div>
    <a href="{{ url_for('vessel.vessel_list') }}" class="btn btn-outline">← 목록으로</a>
  </div>

  <div class="card">
    <form method="POST" action="{{ url_for('vessel.vessel_new') }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />

      <!-- 기본 정보 섹션 -->
      <div class="form-section">기본 정보</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="name">선박명 *</label>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="예) HYUNDAI AQUILA" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="imo_number">IMO 번호 *</label>
          <input type="number" id="imo_number" name="imo_number" class="form-control"
                 placeholder="예) 9876543" required min="1000000" max="9999999" />
        </div>
        <div class="form-group">
          <label class="form-label" for="ship_type">선종 *</label>
          <select id="ship_type" name="ship_type" class="form-control" required>
            <option value="" disabled selected>선택하세요</option>
            <option value="CNTR">CONTAINER</option>
            <option value="BULK">BULK Carrier</option>
            <option value="TNKR">Tanker</option>
            <option value="GAS">GAS Carrier</option>
            <option value="PCTC">PCTC</option>
            <option value="MPV">MPV</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="ship_size">선박 크기 *</label>
          <input type="text" id="ship_size" name="ship_size" class="form-control"
                 placeholder="예) 13.1K " required />
        </div>
        <div class="form-group">
          <label class="form-label" for="flag">국적 *</label>
          <select id="flag" name="flag" class="form-control" required>
            <option value="" disabled selected>선택하세요</option>
            <option value="KOR">대한민국</option>
            <option value="PAN">파나마</option>
            <option value="LIB">라이베리아</option>
            <option value="MAR">마샬</option>
            <option value="SIN">싱가폴</option>
          </select>
        </div>
      </div>

      <!-- 상세 정보 섹션 -->
      <div class="form-section">상세 정보</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="ship_code">선박 코드 * (6자리)</label>
          <input type="text" id="ship_code" name="ship_code" class="form-control"
                 placeholder="예) HOHA" maxlength="4" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="vessel_ro">선박 RO *</label>
          <input type="text" id="vessel_ro" name="vessel_ro" class="form-control"
                 placeholder="예) 자사선, 용선" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="vessel_class">선급 *</label>
          <input type="text" id="vessel_class" name="vessel_class" class="form-control"
                 placeholder="예) KR, ABS, DNV" required />   
        </div>
        <div class="form-group">
          <label class="form-label" for="built_year">건조 연도</label>
          <input type="text" id="built_year" name="built_year" class="form-control"
                 placeholder="예) 건조년월(2021-04)" />
        </div>
        <div class="form-group">
          <label class="form-label" for="team">담당팀 *</label>
          <select id="team" name="team" class="form-control" required>
            <option value="" disabled selected>선택하세요</option>
            <option value="C1T">컨테이너선1팀</option>
            <option value="C2T">컨테이너선2팀</option>
            <option value="C3T">컨테이너선3팀</option>
            <option value="C4T">컨테이너선4팀</option>
            <option value="TKT">유조선팀</option>
            <option value="LBT">LNG & BULK선팀</option>            
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="crew">인사팀 *</label>
          <select id="team" name="team" class="form-control" required>
            <option value="" disabled selected>선택하세요</option>
            <option value="CM1">해상인사1팀</option>
            <option value="CM2">해상인사2팀</option>         
          </select>
        </div>
      </div>

      <!-- 취소 / 등록 버튼 -->
      <div class="form-actions">
        <a href="{{ url_for('vessel.vessel_list') }}" class="btn btn-outline">취소</a>
        <button type="submit" class="btn btn-primary">등록하기</button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
