{% extends "base.html" %}

{% block title %}{{ vessel.name }} 수정 - HOS 선박관리{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/vessel_edit.css') }}" />
{% endblock %}

{% block content %}
<div class="container form-page">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">선박 정보 수정</h1>
      <p class="page-subtitle">{{ vessel.name }}</p>
    </div>
    <a href="{{ url_for('vessel.vessel_detail', vessel_id=vessel.id) }}" class="btn btn-outline">← 상세로</a>
  </div>

  <div class="card">
    <form method="POST" action="{{ url_for('vessel.vessel_edit', vessel_id=vessel.id) }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />

      <!-- 기본 정보 섹션 -->
      <div class="form-section">기본 정보</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="name">선박명 *</label>
          <input type="text" id="name" name="name" class="form-control"
                 value="{{ vessel.name }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="imo_number">IMO 번호 *</label>
          <input type="number" id="imo_number" name="imo_number" class="form-control"
                 value="{{ vessel.imo_number }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="ship_type">선종 *</label>
          <select id="ship_type" name="ship_type" class="form-control" required>
            <option value="Container"    {% if vessel.ship_type == 'Container' %}selected{% endif %}>Container</option>
            <option value="Bulk Carrier" {% if vessel.ship_type == 'Bulk Carrier' %}selected{% endif %}>Bulk Carrier</option>
            <option value="Tanker"       {% if vessel.ship_type == 'Tanker' %}selected{% endif %}>Tanker</option>
            <option value="LNG"          {% if vessel.ship_type == 'LNG' %}selected{% endif %}>LNG</option>
            <option value="RORO"         {% if vessel.ship_type == 'RORO' %}selected{% endif %}>RORO</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="ship_size">선박 크기 *</label>
          <input type="text" id="ship_size" name="ship_size" class="form-control"
                 value="{{ vessel.ship_size }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="flag">국적 *</label>
          <input type="text" id="flag" name="flag" class="form-control"
                 value="{{ vessel.flag }}" required />
        </div>
      </div>

      <!-- 상세 정보 섹션 -->
      {% if vessel.detail %}
      <div class="form-section">상세 정보</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="ship_code">선박 코드 *</label>
          <input type="text" id="ship_code" name="ship_code" class="form-control"
                 value="{{ vessel.detail.ship_code }}" maxlength="6" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="vessel_ro">선박 구분 *</label>
          <input type="text" id="vessel_ro" name="vessel_ro" class="form-control"
                 value="{{ vessel.detail.vessel_ro }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="vessel_class">선급 *</label>
          <input type="text" id="vessel_class" name="vessel_class" class="form-control"
                 value="{{ vessel.detail.vessel_class }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="built_year">건조 연도</label>
          <input type="text" id="built_year" name="built_year" class="form-control"
                 value="{{ vessel.detail.built_year or '' }}" />
        </div>
        <div class="form-group">
          <label class="form-label" for="team">담당팀 *</label>
          <input type="text" id="team" name="team" class="form-control"
                 value="{{ vessel.detail.team }}" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="crew">선원 정보 *</label>
          <input type="text" id="crew" name="crew" class="form-control"
                 value="{{ vessel.detail.crew }}" required />
        </div>
      </div>
      {% endif %}

      <!-- 취소 / 저장 버튼 -->
      <div class="form-actions">
        <a href="{{ url_for('vessel.vessel_detail', vessel_id=vessel.id) }}" class="btn btn-outline">취소</a>
        <button type="submit" class="btn btn-primary">저장하기</button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
